<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Recipe Nutrition API{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <h1><a href="/" class="site-title">Recipe Nutrition API</a></h1>
        <p class="topbar-copy">Manage recipes and estimate ingredient nutrition.</p>
      </div>

      <nav class="main-nav" aria-label="Primary">
        <a href="/" class="nav-link {% block nav_recipes %}{% endblock %}">Recipes</a>
        <a href="/recipes/new" class="nav-link {% block nav_add %}{% endblock %}">Add Recipe</a>
        <a href="/nutrition" class="nav-link {% block nav_nutrition %}{% endblock %}">Nutrition</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
