{% extends "base.html" %}

{% block title %}Recipes | Recipe Nutrition API{% endblock %}
{% block nav_recipes %}active{% endblock %}

{% block content %}
<section class="panel">
  <div class="section-heading">
    <div>
      <p class="section-kicker">Recipes</p>
      <h2>Recipe Library</h2>
    </div>
    <a href="/recipes/new" class="button-link">Add Recipe</a>
  </div>

  <h3>Search & Filters</h3>
  <div class="search-filter-grid">
    <input type="text" id="searchInput" placeholder="Search recipes by name..." />
    <input type="text" id="tagFilter" placeholder="Filter by tag (e.g. easy)" />
    <input type="number" id="minutesFilter" placeholder="Max minutes" />
    <div class="button-row">
      <button type="button" id="searchRecipesButton">Search</button>
      <button type="button" class="secondary" id="resetFiltersButton">Reset</button>
    </div>
  </div>
</section>

<section class="panel">
  <div class="recipes-header">
    <div>
      <p class="section-kicker">Recipe List</p>
      <h2>All Recipes</h2>
    </div>
    <button type="button" id="refreshRecipesButton">Refresh</button>
  </div>

  <div id="recipesGrid" class="recipes-grid"></div>
</section>

<script type="module" src="/static/js/main.js"></script>
{% endblock %}
