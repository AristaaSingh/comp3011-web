{% extends "base.html" %}

{% block title %}Recipe Details | Recipe Nutrition API{% endblock %}
{% block nav_recipes %}active{% endblock %}

{% block content %}
<section class="hero-panel">
  <div class="hero-copy">
    <h2 id="recipeDetailTitle">Loading recipe...</h2>
    <p class="hero-text">View the recipe summary, ingredients, and method in one place.</p>
  </div>
  <div class="button-row">
    <a id="editRecipeLink" href="#" class="button-link">Edit</a>
    <a href="/" class="button-link secondary-link">Back</a>
  </div>
</section>

<section class="panel">
  <div id="recipeDetailContent">
    <p class="note">Loading recipe details...</p>
  </div>
</section>

<script>
  window.RECIPE_DETAIL_CONFIG = {
    recipeId: "{{ recipe_id }}"
  };
</script>
<script type="module" src="/static/js/main.js"></script>
{% endblock %}
