<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account | Recipe Nutrition API</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <h1><a href="./index.html" class="site-title">Recipe Nutrition API</a></h1>
        <p class="topbar-copy">Manage recipes and estimate ingredient nutrition.</p>
      </div>

      <nav class="main-nav" aria-label="Primary">
        <a href="./index.html" class="nav-link">Recipes</a>
        <a href="./recipe-form.html" class="nav-link">Add Recipe</a>
        <a href="./nutrition.html" class="nav-link">Nutrition</a>
        <a href="./auth.html" class="nav-link active" data-auth-nav-link>Account</a>
      </nav>
    </header>

    <main class="container">
      <section class="hero-panel">
        <div class="hero-copy">
          <h2>Account</h2>
          <p class="hero-text">Register or sign in to create, update, and delete recipes.</p>
        </div>
      </section>

      <section class="panel">
        <div id="authStatus" class="auth-status hidden"></div>

        <div class="auth-grid">
          <section class="subpanel">
            <div class="form-header">
              <h3>Sign In</h3>
            </div>

            <form id="loginForm">
              <div class="form-grid">
                <input type="email" id="loginEmail" placeholder="Email address" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
              </div>

              <div class="button-row">
                <button type="submit">Sign In</button>
              </div>
            </form>
          </section>

          <section class="subpanel">
            <div class="form-header">
              <h3>Create Account</h3>
            </div>

            <form id="registerForm">
              <div class="form-grid">
                <input type="email" id="registerEmail" placeholder="Email address" required />
                <input type="password" id="registerPassword" placeholder="Password" required />
              </div>

              <div class="button-row">
                <button type="submit">Register</button>
              </div>
            </form>
          </section>
        </div>

        <div id="authPanel" class="subpanel auth-panel hidden">
          <div class="form-header">
            <h3>Signed In</h3>
          </div>
          <p id="authUserSummary" class="note"></p>
          <div class="button-row">
            <button type="button" class="secondary" id="logoutButton">Log Out</button>
          </div>
        </div>

        <pre id="authOutput"></pre>
      </section>
    </main>
  </div>

  <script src="./assets/config.js"></script>
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
